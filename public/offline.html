<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F97316" />
    <title>Offline | E-Malla Rwanda</title>
    <style>
      :root {
        color-scheme: light;
        --brand: #f97316;
        --ink: #111827;
        --muted: #6b7280;
        --surface: #ffffff;
        --edge: #fed7aa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(249, 115, 22, 0.12), transparent 28%),
          linear-gradient(180deg, #fff7ed 0%, #ffffff 70%);
        font-family: Montserrat, Arial, sans-serif;
        color: var(--ink);
        padding: 24px;
      }

      .card {
        width: min(100%, 480px);
        background: var(--surface);
        border: 1px solid var(--edge);
        border-radius: 32px;
        padding: 32px 28px;
        box-shadow: 0 24px 70px rgba(17, 24, 39, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brand);
      }

      .mark {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin: 18px 0 20px;
        background: linear-gradient(135deg, #111827, #f97316);
        color: #fff;
        font-size: 26px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
        flex-wrap: wrap;
      }

      .button {
        appearance: none;
        border: 0;
        cursor: pointer;
        border-radius: 18px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }

      .button-primary {
        background: var(--brand);
        color: #fff;
      }

      .button-secondary {
        background: #f3f4f6;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">E-Malla Rwanda Offline</div>
      <div class="mark">E</div>
      <h1>Your marketplace is waiting offline.</h1>
      <p>
        Your saved app shell is ready. Reconnect to continue browsing products, tracking deliveries,
        or managing seller, rider, and admin activity on E-Malla Rwanda.
      </p>
      <div class="actions">
        <button class="button button-primary" type="button" onclick="window.location.reload()">
          Try Again
        </button>
        <a class="button button-secondary" href="/">Go Home</a>
      </div>
    </main>
  </body>
</html>
